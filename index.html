<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Vietnam Festival Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:url("https://images.unsplash.com/photo-1528127269322-539801943592");
background-size:cover;
background-position:center;
padding:140px 20px;
text-align:center;
color:white;
}

header h1{
font-size:50px;
margin-bottom:10px;
}

header p{
font-size:20px;
}

.search{
margin-top:20px;
}

.search input{
padding:12px;
width:300px;
font-size:16px;
border:none;
border-radius:5px;
}

nav{
background:#111;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:bold;
}

section{
padding:60px 10%;
}

h2{
text-align:center;
margin-bottom:40px;
}

#map{
height:500px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

button{
background:#e53935;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>🇻🇳 Vietnam Festival Explorer</h1>

<p>Khám phá các lễ hội truyền thống Việt Nam</p>

<div class="search">

<input id="searchBox" placeholder="Tìm lễ hội hoặc tỉnh...">

</div>

</header>

<nav>

<a href="#map">Bản đồ</a>

<a href="#list">Danh sách lễ hội</a>

</nav>

<section>

<h2>Bản đồ lễ hội</h2>

<div id="map"></div>

</section>

<section id="list">

<h2>Danh sách lễ hội</h2>

<div class="grid" id="festivalList"></div>

</section>

<footer>

<p>Vietnam Festival Explorer</p>

<p>Nền tảng khám phá lễ hội Việt Nam</p>

</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([16.047079,108.206230],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);

var festivals=[

{
name:"Lễ hội Đền Hùng",
province:"Phú Thọ",
lat:21.395,
lng:105.243,
desc:"Lễ hội tưởng nhớ công lao dựng nước của các Vua Hùng.",
img:"https://upload.wikimedia.org/wikipedia/commons/5/56/Den_Hung.jpg"
},

{
name:"Lễ hội Chùa Hương",
province:"Hà Nội",
lat:20.345,
lng:105.652,
desc:"Lễ hội hành hương Phật giáo lớn nhất miền Bắc.",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Perfume_Pagoda.jpg"
},

{
name:"Hội Lim",
province:"Bắc Ninh",
lat:21.121,
lng:106.061,
desc:"Lễ hội nổi tiếng với dân ca Quan Họ.",
img:"https://upload.wikimedia.org/wikipedia/commons/7/71/Hoi_Lim.jpg"
},

{
name:"Festival Huế",
province:"Huế",
lat:16.4637,
lng:107.5909,
desc:"Lễ hội văn hóa lớn nhất miền Trung.",
img:"https://upload.wikimedia.org/wikipedia/commons/2/22/Hue_Festival.jpg"
},

{
name:"Lễ hội Bà Chúa Xứ",
province:"An Giang",
lat:10.705,
lng:105.116,
desc:"Lễ hội tâm linh lớn của miền Tây Nam Bộ.",
img:"https://upload.wikimedia.org/wikipedia/commons/d/d6/Ba_Chua_Xu.jpg"
}

];

festivals.forEach(function(f){

var marker=L.marker([f.lat,f.lng]).addTo(map);

marker.bindPopup(

`
<h3>${f.name}</h3>

<p><b>Địa điểm:</b> ${f.province}</p>

<p>${f.desc}</p>

<a href="https://www.google.com/maps/dir/?api=1&destination=${f.lat},${f.lng}" target="_blank">

<button>Chỉ đường</button>

</a>

`

);

});

var list=document.getElementById("festivalList");

function render(data){

list.innerHTML="";

data.forEach(f=>{

list.innerHTML+=`

<div class="card">

<img src="${f.img}">

<div class="card-content">

<h3>${f.name}</h3>

<p>${f.province}</p>

<p>${f.desc}</p>

</div>

</div>

`;

});

}

render(festivals);

document.getElementById("searchBox").addEventListener("input",function(){

let keyword=this.value.toLowerCase();

let filtered=festivals.filter(f=>

f.name.toLowerCase().includes(keyword) ||

f.province.toLowerCase().includes(keyword)

);

render(filtered);

});

</script>

</body>

</html>
