.grid{

.card{

footer{

/* HIỂN THỊ MARKER */

festivals.forEach(function(f){

var marker=L.marker([f.lat,f.lng]).addTo(map);

marker.bindPopup(

`
<h3>${f.name}</h3>

<p><b>Địa điểm:</b> ${f.province}</p>

<p>${f.desc}</p>

<a href="https://www.google.com/maps/dir/?api=1&destination=${f.lat},${f.lng}" target="_blank">

<button>Chỉ đường</button>

</a>
`

);

markers.push(marker);

});

/* HIỂN THỊ DANH SÁCH */

var list=document.getElementById("festivalList");

function render(data){

list.innerHTML="";

data.forEach((f,index)=>{

list.innerHTML+=`

<div class="card" onclick="goToFestival(${index})">

<img src="${f.img}">

<div class="card-content">

<h3>${f.name}</h3>

<p><b>${f.province}</b></p>

<p>${f.desc}</p>

</div>

</div>

`;

});

}

render(festivals);

/* CLICK CARD → ZOOM MAP */

function goToFestival(i){

var f=festivals[i];

map.setView([f.lat,f.lng],11);

markers[i].openPopup();

document.getElementById("map").scrollIntoView({behavior:"smooth"});

}

/* SEARCH */

document.getElementById("searchBox").addEventListener("input",function(){

let keyword=this.value.toLowerCase();

let filtered=festivals.filter(f=>

f.name.toLowerCase().includes(keyword) ||
f.province.toLowerCase().includes(keyword)

);

render(filtered);

});

/* TÍNH KHOẢNG CÁCH */

function getDistance(lat1,lon1,lat2,lon2){

function toRad(x){return x*Math.PI/180;}

var R=6371;

var dLat=toRad(lat2-lat1);
var dLon=toRad(lon2-lon1);

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
Math.sin(dLon/2)*Math.sin(dLon/2);

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

/* TÌM 10 LỄ HỘI GẦN NHẤT */

function findNearFestival(){

if(!navigator.geolocation){

alert("Trình duyệt không hỗ trợ GPS");
return;

}

navigator.geolocation.getCurrentPosition(function(position){

var userLat=position.coords.latitude;
var userLng=position.coords.longitude;

L.marker([userLat,userLng])
.addTo(map)
.bindPopup("📍 Bạn đang ở đây")
.openPopup();

map.setView([userLat,userLng],10);

let results=festivals.map(f=>{

let distance=getDistance(userLat,userLng,f.lat,f.lng);

return {...f,distance};

});

results.sort((a,b)=>a.distance-b.distance);

let nearest=results.slice(0,10);

showNearestFestivals(nearest);

});

}

/* HIỂN THỊ 10 LỄ HỘI */

function showNearestFestivals(listData){

var html="<h2>10 lễ hội gần bạn</h2>";

listData.forEach((f,i)=>{

html+=`

<div class="card">

<img src="${f.img}">

<div class="card-content">

<h3>${i+1}. ${f.name}</h3>

<p><b>${f.province}</b></p>

<p>Khoảng cách: ${f.distance.toFixed(1)} km</p>

<p>${f.desc}</p>

<a href="https://www.google.com/maps/dir/?api=1&destination=${f.lat},${f.lng}" target="_blank">

<button>Chỉ đường</button>

</a>

</div>

</div>

`;

});

document.getElementById("festivalList").innerHTML=html;

}
