function buildFestivalDetailVietnamese(item) {
    var theme = getFestivalTheme(item);
    var intro = item.name + ' là lễ hội tiêu biểu tại ' + item.province + ', phản ánh chiều sâu lịch sử, tín ngưỡng và đời sống văn hóa của cộng đồng địa phương.';
    var highlight = getFestivalSpecificHighlight(item.name);
    var activities = getFestivalActivities(theme);
    var tip = getFestivalTravelTip(theme);
    return intro + ' ' + highlight + ' ' + activities + ' ' + tip;
}

function enrichFestivalDetailsVietnamese() {
    festivals.forEach(function(festival) {
        festival.detail = manualFestivalDetailById[festival.id] || buildFestivalDetailVietnamese(festival);
    });
}

enrichFestivalDetailsVietnamese();

function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
}

const fallbackLabelByType = {
    festival: "Le hoi",
    entertainment: "Khu vui choi",
    food: "Am thuc",
    hotel: "Khach san",
    medical: "Benh vien",
    store: "Cua hang"
};

function buildFallbackDataUri(type) {
    const label = fallbackLabelByType[type] || "Hinh minh hoa";
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300' viewBox='0 0 400 300'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#ffd9ba'/><stop offset='100%' stop-color='#e84a2a'/></linearGradient></defs><rect width='400' height='300' fill='url(#g)'/><circle cx='320' cy='60' r='38' fill='rgba(255,255,255,0.25)'/><circle cx='72' cy='235' r='52' fill='rgba(255,255,255,0.15)'/><text x='200' y='150' dominant-baseline='middle' text-anchor='middle' fill='#ffffff' font-family='Arial, sans-serif' font-size='28' font-weight='700'>${label}</text></svg>`;
    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

function resolveImageUrl(url, type) {
    if (!url || typeof url !== 'string') return buildFallbackDataUri(type);
    let normalized = url.trim();
    if (!normalized) return buildFallbackDataUri(type);

    normalized = normalized.replace(/\\/g, '/');

    if (normalized.startsWith('-festival-map-vietnam/')) {
        normalized = normalized.replace('-festival-map-vietnam/', '');
    }

    if (normalized.startsWith('/-festival-map-vietnam/')) {
        normalized = normalized.replace('/-festival-map-vietnam/', '');
    }

    if (normalized.includes('source.unsplash.com')) {
        const seed = encodeURIComponent(`${type || 'img'}-${normalized.slice(-48)}`);
        return `https://picsum.photos/seed/${seed}/400/300`;
    }

    if (/^https?:\/\//i.test(normalized) || normalized.startsWith('data:image')) {
        return normalized;
    }

    return encodeURI(normalized);
}

function getImageOnError(type) {
    const fallback = buildFallbackDataUri(type);
    return `this.onerror=null;this.src='${fallback}'`;
}

const AUTH_TOKEN_KEY = 'lehoi_auth_token';

function resolveApiUrl(path) {
    var customBase = (window.LEHOI_AUTH_API_BASE || '').trim();
    if (customBase) return customBase.replace(/\/$/, '') + path;

    var isFile = window.location.protocol === 'file:';
    var isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    var notBackendPort = window.location.port && window.location.port !== '3000';
    if (isFile || (isLocalHost && notBackendPort)) {
        return 'http://localhost:3000' + path;
    }
    return path;
}

function getAuthToken() {
    return localStorage.getItem(AUTH_TOKEN_KEY) || '';
}

async function authFetch(path, options) {
    var token = getAuthToken();
    if (!token) return null;
    var headers = Object.assign({}, options && options.headers ? options.headers : {});
    headers.Authorization = 'Bearer ' + token;
    if (!headers['Content-Type'] && options && options.body) {
        headers['Content-Type'] = 'application/json';
    }

    try {
        var resp = await fetch(resolveApiUrl(path), Object.assign({}, options || {}, { headers: headers }));
        if (!resp.ok) return null;
        return await resp.json();
    } catch (e) {
        return null;
    }
}

function getRegionByProvince(province) {
    var p = normalizeVietnameseText(province || '');
    var north = ['ha noi','bac ninh','hai phong','quang ninh','hai duong','nam dinh','phu tho','lao cai','lang son','ha giang','son la','thai binh','thai nguyen','tuyen quang','vinh phuc','ninh binh'];
    var central = ['thanh hoa','nghe an','ha tinh','quang binh','quang tri','hue','thua thien hue','da nang','quang nam','quang ngai','binh dinh','phu yen','khanh hoa','ninh thuan','binh thuan','kon tum','gia lai','dak lak','dak nong','lam dong'];
    if (north.some(function(x){ return p.includes(x); })) return 'bac';
    if (central.some(function(x){ return p.includes(x); })) return 'trung';
    return 'nam';
}

function buildPersonalizedText(item, type, profileData) {
    if (!profileData || !profileData.profile) return '';
    var profile = profileData.profile;
    var messages = [];

    if (type === 'festival' && Array.isArray(profile.favoriteFestivalIds) && profile.favoriteFestivalIds.includes(item.id)) {
        messages.push('Lễ hội này nằm trong danh sách yêu thích của bạn.');
    }

    if (type === 'festival' && Array.isArray(profile.favoriteRegions) && profile.favoriteRegions.length) {
        var region = getRegionByProvince(item.province);
        if (profile.favoriteRegions.includes(region)) {
            messages.push('Khu vực lễ hội này trùng với vùng bạn ưu tiên trong hồ sơ.');
        }
    }

    if (profile.city) {
        var cityNorm = normalizeVietnameseText(profile.city);
        var provinceNorm = normalizeVietnameseText(item.province || '');
        if (cityNorm && provinceNorm && (provinceNorm.includes(cityNorm) || cityNorm.includes(provinceNorm))) {
            messages.push('Địa điểm này gần với tỉnh/thành bạn đã lưu trong hồ sơ.');
        }
    }

    if (!messages.length && type === 'festival') {
        messages.push('Bạn có thể thêm lễ hội này vào mục yêu thích trong trang Hồ sơ để nhận gợi ý cá nhân hóa tốt hơn.');
    }

    return messages.join(' ');
}

function renderPersonalizedBox(text, userName) {
    var box = document.getElementById('personalizedBox');
    if (!box) return;
    if (!text) {
        box.classList.remove('show');
        box.innerHTML = '';
        return;
    }

    box.innerHTML = '<h3>Gợi ý cho ' + (userName || 'bạn') + '</h3><p>' + text + '</p>';
    box.classList.add('show');
}

async function logDetailActivity(type, item) {
    if (!item) return;
    await authFetch('/api/activity/log', {
        method: 'POST',
        body: JSON.stringify({
            action: 'view_detail',
            type: type || '',
            itemId: item.id,
            itemName: item.name,
            location: 'detail'
        }),
        headers: { 'Content-Type': 'application/json' }
    });
}
