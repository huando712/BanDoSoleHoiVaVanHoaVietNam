<head>
<meta charset="UTF-8">

<title>Chi tiết - Bản đồ Lễ hội & Văn hóa Việt Nam</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
min-height: 100vh;
}

header{
background:url("https://images.unsplash.com/photo-1528127269322-539801943592");
background-size:cover;
background-position:center;
padding:60px 20px;
text-align:center;
color:white;
}

header h1{
font-size:35px;
}

nav{
background:#111;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:bold;
}

section{
padding:50px 10%;
background: rgba(255,255,255,0.9);
margin: 20px auto;
border-radius: 15px;
box-shadow: 0 5px 15px rgba(0,0,0,0.1);
max-width: 800px;
}

.detail-card{
text-align:left;
}

.detail-card img{
width:100%;
max-width:560px;
border-radius:10px;
margin-bottom:20px;
display:block;
margin-left:auto;
margin-right:auto;
}

.detail-card h2{
color:#e53935;
}

.detail-card p{
line-height:1.6;
}

.detail-top-head{
text-align:center;
}

.detail-subtitle{
margin:0;
font-size:18px;
color:#5a3b2a;
}

.detail-chip-row{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin:10px 0 18px;
}

.detail-chip{
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
background:rgba(229,57,53,0.1);
color:#8f2b1b;
border:1px solid rgba(229,57,53,0.2);
}

.detail-lead{
padding:14px 16px;
border-radius:12px;
background:linear-gradient(145deg, rgba(255,250,241,0.95), rgba(255,236,209,0.85));
border:1px solid rgba(229,57,53,0.16);
color:#4e372a;
}

.detail-grid{
margin-top:14px;
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
}

.detail-block{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.86);
border:1px solid rgba(229,57,53,0.14);
box-shadow:0 6px 14px rgba(0,0,0,0.06);
}

.detail-block h3{
margin:0 0 8px;
font-size:18px;
color:#9b2f24;
}

.detail-list{
margin:0;
padding-left:18px;
line-height:1.55;
color:#4a3529;
}

.detail-list li{ margin-bottom:4px; }

.detail-meta{
margin-top:14px;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.82);
border:1px solid rgba(229,57,53,0.16);
display:grid;
gap:6px;
}

.detail-actions{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:14px;
}

.detail-actions a{
text-decoration:none;
}

.detail-action-button{
border:none;
border-radius:999px;
padding:11px 18px;
font-size:14px;
font-weight:700;
cursor:pointer;
transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
box-shadow:0 10px 20px rgba(217,74,43,0.18);
}

.detail-action-button:hover{
transform:translateY(-1px);
}

.detail-action-button.primary{
background:linear-gradient(135deg,#d94a2b,#f06a3f);
color:#fff;
}

.detail-action-button.secondary{
background:rgba(255,255,255,0.92);
color:#8f2b1b;
border:1px solid rgba(217,74,43,0.24);
box-shadow:none;
}

.detail-action-button.secondary.active{
background:rgba(217,74,43,0.12);
color:#7b1f13;
border-color:rgba(217,74,43,0.34);
}

.detail-hero-shell{
display:grid;
grid-template-columns:minmax(0,1.3fr) minmax(280px,0.9fr);
gap:16px;
align-items:stretch;
margin-bottom:18px;
}

.detail-hero-copy,
.detail-hero-media{
border-radius:18px;
overflow:hidden;
}

.detail-hero-copy{
padding:18px;
background:linear-gradient(145deg, rgba(255,248,239,0.98), rgba(255,231,206,0.88));
border:1px solid rgba(217,74,43,0.16);
box-shadow:0 14px 30px rgba(108,49,22,0.08);
}

.detail-hero-kicker{
display:inline-flex;
align-items:center;
gap:8px;
padding:7px 12px;
border-radius:999px;
background:rgba(217,74,43,0.1);
color:#9a2b1d;
font-size:12px;
font-weight:800;
letter-spacing:.08em;
text-transform:uppercase;
}

.detail-hero-intro{
margin:14px 0 0;
font-size:15px;
line-height:1.7;
color:#53392c;
}

.detail-quick-grid{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:10px;
margin-top:16px;
}

.detail-quick-card{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.8);
border:1px solid rgba(217,74,43,0.12);
}

.detail-quick-label{
display:block;
font-size:11px;
font-weight:800;
letter-spacing:.08em;
text-transform:uppercase;
color:#9a2b1d;
margin-bottom:6px;
}

.detail-quick-value{
display:block;
font-size:14px;
line-height:1.5;
color:#35241c;
}

.detail-hero-media{
position:relative;
min-height:100%;
background:linear-gradient(180deg, rgba(60,32,18,0.08), rgba(60,32,18,0.28));
}

.detail-hero-media img{
width:100%;
height:100%;
min-height:340px;
object-fit:cover;
display:block;
margin:0;
}

.detail-image-overlay{
position:absolute;
left:16px;
right:16px;
bottom:16px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.detail-image-chip{
padding:8px 12px;
border-radius:999px;
background:rgba(39,23,16,0.7);
backdrop-filter:blur(8px);
color:#fff7ef;
font-size:12px;
font-weight:700;
}

.detail-story-band{
margin:18px 0 16px;
display:grid;
grid-template-columns:1.1fr .9fr;
gap:12px;
}

.detail-story-card,
.detail-planner-card,
.detail-etiquette-card{
padding:15px 16px;
border-radius:16px;
background:rgba(255,255,255,0.86);
border:1px solid rgba(217,74,43,0.14);
box-shadow:0 10px 24px rgba(0,0,0,0.05);
}

.detail-section-kicker{
display:block;
margin-bottom:8px;
font-size:11px;
font-weight:800;
letter-spacing:.08em;
text-transform:uppercase;
color:#9a2b1d;
}

.detail-story-card p,
.detail-planner-card p,
.detail-etiquette-card p{
margin:0;
line-height:1.65;
color:#473328;
}

.detail-planner-grid{
margin-top:16px;
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
}

.detail-mini-list{
margin:8px 0 0;
padding-left:18px;
line-height:1.55;
color:#4a3529;
}

.detail-mini-list li{
margin-bottom:5px;
}

.detail-note-grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
margin-top:16px;
}

.detail-note-card{
padding:14px 15px;
border-radius:16px;
background:linear-gradient(145deg, rgba(255,247,237,0.98), rgba(255,237,219,0.92));
border:1px solid rgba(217,74,43,0.14);
}

.detail-note-card h3{
margin:0 0 8px;
font-size:16px;
color:#8e2d20;
}

.detail-note-card p{
margin:0;
line-height:1.6;
color:#4b362a;
}

/* Audience Fit */
.audience-fit{
margin-top:16px;
padding:14px 16px;
border-radius:14px;
background:linear-gradient(135deg,rgba(255,248,238,0.95),rgba(255,240,220,0.9));
border:1px solid rgba(217,74,43,0.18);
}
.audience-fit h4{
margin:0 0 10px;
font-size:13px;
font-weight:700;
color:#972519;
text-transform:uppercase;
letter-spacing:.6px;
}
.audience-fit-rows{
display:flex;
flex-direction:column;
gap:8px;
}
.audience-row{
display:flex;
align-items:center;
gap:10px;
}
.audience-label{
font-size:13px;
font-weight:600;
color:#2a1f18;
width:90px;
flex-shrink:0;
}
.audience-dots{
display:flex;
gap:5px;
}
.audience-dot{
width:14px;
height:14px;
border-radius:50%;
border:2px solid rgba(217,74,43,0.3);
background:#f3dfc8;
transition:background .2s;
}
.audience-dot.filled{
background:#d94a2b;
border-color:#d94a2b;
}
.audience-dot.half{
background:linear-gradient(90deg,#d94a2b 50%,#f3dfc8 50%);
border-color:#d94a2b;
}
.audience-tag{
font-size:11px;
color:#5f5148;
font-style:italic;
}

@media (max-width:700px){
    .detail-grid{grid-template-columns:1fr;}
    .detail-hero-shell,
    .detail-story-band,
    .detail-note-grid,
    .detail-planner-grid,
    .detail-quick-grid{
        grid-template-columns:1fr;
    }

    .detail-hero-media img{
        min-height:260px;
    }
}

.personalized-box{
display:none;
margin-bottom:16px;
padding:12px 14px;
border-radius:12px;
background:linear-gradient(135deg, rgba(255,245,221,0.92), rgba(255,233,200,0.92));
border:1px solid rgba(229,57,53,0.25);
text-align:left;
}

.personalized-box.show{
display:block;
}

.personalized-box h3{
margin:0 0 6px;
color:#8f2b1b;
}

.personalized-box p{
margin:0;
color:#553d2f;
}

.back-button{
background:#e53935;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin-top:20px;
}

.back-button:hover{
background:#d32f2f;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

</style>

</head>

{id:2,name:"Lễ hội Chùa Hương",province:"Hà Nội",lat:20.345,lng:105.652,desc:"Lễ hội hành hương Phật giáo",img:"image/chuahuongg.jpg",detail:"Lễ hội Chùa Hương diễn ra vào tháng giêng âm lịch tại Chùa Hương (Hà Tây), một trong những ngôi chùa linh thiêng nhất Việt Nam. Lễ hội kéo dài từ tháng giêng đến tháng ba âm lịch, thu hút hàng triệu du khách và tín đồ. Ý nghĩa của lễ hội là tưởng nhớ Phật Bà Quan Âm và cầu mong bình an, sức khỏe. Các hoạt động bao gồm: lễ tế tính, hành hương, thắp nến, đi lễ chùa, và các trò chơi dân gian truyền thống. Du khách thường thực hiện hành trình sông Yên Đào để đến chùa, một hành trình mang tính tâm linh sâu sắc. Lễ hội là nơi kết hợp giữa tín ngưỡng, văn hóa dân gian Việt Nam và phương thức thể thao giải trí."},
{id:3,name:"Hội Lim",province:"Bắc Ninh",lat:21.121,lng:106.061,desc:"Lễ hội Quan họ",img:"image/hoilim.jpg",detail:"Hội Lim diễn ra vào ngày 13 tháng giêng âm lịch tại làng Lim, Bắc Ninh, là một lễ hội văn hóa truyền thống lâu đời của đồng bằng Bắc Bộ. Lễ hội có nguồn gốc từ việc tưởng nhớ vị tính nhân từ Thánh Tông và các vị tiên của làng. Hoạt động chính là trình diễn và hát Ru – một thể loại nhạc dân gian độc đáo mang nét tinh tế, phổ biến trong vùng miền. Nam thanh nữ tú hát vừa chèo vừa hát, giao lưu thắm tình yêu đất nước qua những bài hát cổ kính. Ngoài ra còn có thi phỏng ngựa, bắn cung, kéo co, bơi ngang sông. Hội Lim thể hiện chất lừng lẫy của tâm hồn người dân vùng Kinh Bắc."},
{id:4,name:"Festival Huế",province:"Huế",lat:16.4637,lng:107.5909,desc:"Festival văn hóa Huế",img:"image/feshue.jpg",detail:"Lễ hội Năm Huế diễn ra hai năm một lần vào tháng 4 âm lịch tại thành phố Huế, được UNESCO công nhận là Di sản Văn hóa Phi Vật Thể. Festival là dịp tôn vinh những giá trị văn hóa, lịch sử phong phú của xứ Huế cổ kính. Chương trình bao gồm: biểu diễn áo dài truyền thống, trình diễn tranh thêu, gốm sứ, lễ rước Áo dài, diễu hành đường phố, và các biểu diễn âm nhạc nước ngoài. Festival là cầu nối giữa truyền thống Huế hoàng gia với sự hiện đại, thu hút hàng trăm ngàn khách du lịch quốc tế."},
{id:5,name:"Lễ hội Bà Chúa Xứ",province:"An Giang",lat:10.705,lng:105.116,desc:"Lễ hội tín ngưỡng Núi Sam",img:"https://source.unsplash.com/400x300/?festival.jpg",detail:"Lễ hội Bà Chúa Xứ diễn ra vào tháng 11 âm lịch tại Núi Sam, An Giang, tôn vinh Liễu Hạnh – vị thần được dân gian tôn kính như Bà Chúa Xứ. Lễ hội có ý nghĩa tâm linh sâu sắc, cầu mong được bà chúa phù hộ, mang lại may mắn và sức khỏe. Du khách từ khắp nơi đổ về để hành hương, trang trọng lên cầu thang đá dốc để đến đền thờ. Các hoạt động bao gồm: lễ tế cúng bà, hát hò, bán hàng hóa dân gian, các trò chơi truyền thống. Lễ hội tập hợp niềm tin tâm linh của đồng bào miền Tây với những nét đẹp văn hóa Khmer Nam Bộ."},

{id:6,name:"Lễ hội Gióng",province:"Hà Nội",lat:21.083,lng:105.82,desc:"Tôn vinh Thánh Gióng",img:"image/hoi-giong-ha-noi-8.jpg",detail:"Lễ hội Gióng diễn ra vào tháng 4 âm lịch tại Phù Linh, Sóc Sơn, Hà Nội (và một số địa phương khác), tưởng nhớ Thánh Gióng – vị thần bảo vệ đất nước. Theo truyền thuyết, Thánh Gióng là một anh hùng huyền thoại đã chiến đấu chống xâm lược ngoại xâm. Lễ hội bao gồm: rước bệ tượng Thánh Gióng, múa rối, hát ru, các trò chơi dân gian như bịp im, bịp sàng. Đặc biệt, lễ hội Gióng ở Phù Linh có các hoạt động như xiếc, nhạc tổng hợp thuộc lĩnh vực trình diễn nghệ thuật truyền thống Việt Nam. Lễ hội là biểu tượng của lòng tự hào dân tộc và đức tin vào sự bảo vệ của thánh thần."},
{id:7,name:"Lễ hội Yên Tử",province:"Quảng Ninh",lat:21.17,lng:106.73,desc:"Hành hương Yên Tử",img:"https://source.unsplash.com/400x300/?mountain.jpg",detail:"Lễ hội Yên Tử diễn ra vào tháng 1 và tháng 10 âm lịch tại Yên Tử, Quảng Ninh, tôn vinh Trúc Lâm Yên Tử – một trong những nước Phật giáo quan trọng nhất của Việt Nam. Lễ hội có ý nghĩa tôn giáo sâu sắc, thu hút hàng trăm ngàn tín đồ Phật giáo và du khách. Các hoạt động chính bao gồm: hành hương lên núi Yên Tử, thắp nến mình, nghe kinh Phật, các buổi pháp hội, diễu hành với đèn lồng. Quặng nước (núi Yên Tử) có cảnh quan thiên nhiên vô cùng tuyệt đẹp, tạo bầu không khí tâm linh, thanh tịnh. Lễ hội kết hợp giữa hoạt động tôn giáo, du lịch, và bảo vệ di tích lịch sử."},
{id:8,name:"Lễ hội Côn Sơn Kiếp Bạc",province:"Hải Dương",lat:21.12,lng:106.38,desc:"Tưởng nhớ Trần Hưng Đạo",img:"image/con-son-kiep-bac-thumb.jpg",detail:"Lễ hội Côn Sơn Kiếp Bạc diễn ra vào tháng 7 và tháng 8 âm lịch tại đảo Côn Sơn, Hải Phòng, tôn vinh hai vị thần bảo vệ của đảo. Côn Sơn tâm linh là nơi tôn thờ Liễu Hạnh và Tây Tổ, hai vị thần sáng lập nền Phật giáo Việt Nam. Lễ hội thu hút du khách tìm hiểu về lịch sử, văn hóa, tôn giáo của vùng đất thiêng liêng này. Các hoạt động bao gồm: lễ tế cúng, hành hương, khai hội, hát ru, các trò chơi dân gian. Du khách có thể nghe kinh Phật, chiêm ngưỡng những cảnh tổ quốc từ trên đảo, và trải nghiệm không gian tâm linh yên bình."},
{id:9,name:"Lễ hội Đền Trần",province:"Nam Định",lat:20.43,lng:106.16,desc:"Phát ấn đầu năm",img:"image/OIP.jpg",detail:"Lễ hội Đền Trần diễn ra vào tháng 3 âm lịch tại Đền Trần, Hà Nam, tôn vinh các vị thánh Trần – những vị tướng anh hùng của Việt Nam cổ đại. Lễ hội có ý nghĩa lịch sử sâu sắc, tưởng nhớ những bậc tiền nhân đã định đoạt số phận của dân tộc Việt. Các hoạt động chính bao gồm: lễ rước tượng, lễ tế, múa rối nước, kéo co, đua thuyền trên sông Lô, hát ru, bán hàng hóa dân gian. Lễ hội Đền Trần là ngôi lễ hội nổi tiếng được UNESCO công nhận là Di sản Tâm linh của Nhân loại. Lễ hội phản ánh tính cộng đồng mạnh mẽ và niềm tin tâm linh của người dân vùng Đồng Bằng Sông Hồng."},
{id:10,name:"Lễ hội Chọi Trâu",province:"Hải Phòng",lat:20.85,lng:106.68,desc:"Lễ hội truyền thống Đồ Sơn",img:"image/lechoitrau.jpg",detail:"Lễ hội Chọi Trâu diễn ra vào tháng 9 âm lịch tại Đồ Sơn, Hải Phòng, là một lễ hội thể thao dân gian độc đáo của Việt Nam, được UNESCO công nhận là Di sản Văn hóa Phi Vật Thể. Lễ hội có nguồn gốc từ truyền thống chăn nuôi trâu và những võ lâm trở người dân vùng ven biển. Chọi trâu là một môn thể thao dân gian mang tính cộng đồng, thể hiện sức mạnh và khôn véc của động vật. Ngoài trận chọi trâu chính, lễ hội còn có: lễ khai hội, diễu hành, múa rối nước, hát ru, các trò chơi dân gian. Lễ hội Chọi Trâu là biểu tượng của liên kết cộng đồng, giá trị truyền thống văn hóa, và sự bền bỉ của dân tộc Việt Nam."},

{id:11,name:"Lễ hội Hoa Ban",province:"Điện Biên",lat:21.38,lng:103.02,desc:"Lễ hội người Thái",img:"https://media.mia.vn/uploads/blog-du-lich/le-hoi-hoa-ban-muong-lo-va-nhung-tinh-hoa-mien-tay-bac-1646217729.jpg",detail:"Lễ hội Hoa Ban diễn ra vào tháng 3 âm lịch tại Điện Biên, là lễ hội đặc trưng của đồng dân tộc Thái ở vùng Tây Bắc. Hoa Ban với vẻ đẹp tinh khôi, màu trắng như tuyết, là biểu tượng của mùa xuân tươi mới và hy vọng của đất nước. Lễ hội gắn liền với tâm linh, tín ngưỡng và đời sống sinh hoạt của người Thái, được coi là Lễ hội lớn nhất vào mùa xuân. Các hoạt động bao gồm: rước hoa Ban vào đền thờ, lễ tế các vị thánh, múa rối nước, hát ru, đua thuyền trên sông Đà, các trò chơi dân gian như bịp im, kéo co. Lễ hội thể hiện sự kết nối giữa con người, thiên nhiên và các vị thánh, là dịp để mọi người cầu mong một năm an lành, mưa thuận gió hòa, và thu hoạch bội phát."},
{id:12,name:"Lễ hội Lồng Tồng",province:"Tuyên Quang",lat:21.82,lng:105.22,desc:"Xuống đồng đầu năm",img:"https://gotrangtri.vn/wp-content/uploads/2018/10/LongtongBackan1JPG-copy-1024x686.jpg",detail:"Lễ hội Lồng Tồng là lễ hội truyền thống của dân tộc Thó tại Tuyên Quang, diễn ra vào tháng 1 âm lịch nhằm cầu mong được thần thánh phù hộ cho một năm mưa thuận gió hòa, lúa chiêm thuận lợi. Lồng Tồng trong tiếng Thó có nghĩa là 'xuống đồng' hay 'khởi động', biểu tượng cho sự khởi đầu của vụ mưa và mùa trồng trọt mới. Lễ hội kéo dài nhiều ngày với các hoạt động như: lễ tế các thần linh trong nhà và ruộng ngoài, các nghi lễ cầu mưa, hát ru truyền thống, ăn cơm lâm (cơm nấu từ lúa non), múa rối, ném hạt gạo để cầu may. Người dân mặc trang phục truyền thống, say sưa với các bài hát dân gian lâu đời, thể hiện tình yêu thiên nhiên và đất đai."},
{id:13,name:"Lễ hội Đền Bà Triệu",province:"Thanh Hóa",lat:19.75,lng:105.78,desc:"Tưởng nhớ Bà Triệu",img:"https://truyenhinhthanhhoa.qltns.mediacdn.vn/458221966042468352/2023/3/2/le-hoi-den-ba-trieu-di-san-phi-vat-the-quoc-gia-16777202372901134506959.jpg",detail:"Lễ hội Đền Bà Triệu tại Thanh Hóa diễn ra vào tháng 10 âm lịch, tưởng nhớ Bà Triệu (299-248), một vị nữ anh hùng dân tộc nổi tiếng với tinh thần độc lập và can đảm. Bà Triệu là biểu tượng của phụ nữ Việt Nam mạnh mẽ, dũng cảm, từng dấu tranh chống lại sự xâm lược của nhà Phương Đông. Lễ hội là dịp để người dân tôn vinh và tri ân công lao của vị nữ anh hùng này. Các hoạt động bao gồm: lễ tế cúng Bà Triệu, rước bệ tượng, múa rối nước, hát ru, các trò chơi dân gian truyền thống, diễu hành lễ cúng với sự tham gia của hàng ngàn người. Lễ hội không chỉ là nghi lễ tôn giáo mà còn là dịp để nâng cao ý thức về lịch sử dân tộc và vai trò của phụ nữ trong xã hội."},
{id:14,name:"Lễ hội Cầu Ngư",province:"Đà Nẵng",lat:16.05,lng:108.2,desc:"Lễ hội ngư dân",img:"https://static.vinwonders.com/production/le-hoi-nghinh-ong-phu-quoc-1.jpg",detail:"Lễ hội Cầu Ngư tại Đà Nẵng diễn ra vào tháng 7 âm lịch, là lễ hội truyền thống của cộng đồng ngư dân ven biển, nhằm cầu mong được Ông Ngư (Thần Biển) phù hộ cho những chuyến biển an toàn, mưa thuận gió hòa, cá tôm bội phát. Lễ hội gắn liền với sinh hoạt sản xuất, tôn giáo và văn hóa của những người lao động trên biển. Ban ngày, ngư dân thực hiện các nghi lễ lễ tế cúng Thần Biển, chiều tối là những hoạt động văn hóa giải trí như múa rối, hát ru, kéo co, bơi ngang sông, các trò chơi dân gian. Những người tham gia lễ hội mặc trang phục truyền thống, trang trí các bè ngư lặn với cờ hoa, lộc bạc, tạo nên bầu không khí vui tươi, ấm áp. Lễ hội là khoảnh khắc để cộng đồng ngư dân gắn kết, chia sẻ kinh nghiệm sản xuất."},
{id:15,name:"Lễ hội Kate",province:"Ninh Thuận",lat:11.67,lng:108.86,desc:"Lễ hội lớn người Chăm",img:"https://static.vinwonders.com/production/le-hoi-kate-ninh-thuan-3.jpg",detail:"Lễ hội Kate là lễ hội lớn nhất của đạo Bà La Môn (Hinduism) được người Chăm ở Ninh Thuận tôn vinh vào tháng 10 âm lịch (tương đương tháng 8-9 dương lịch). Tên Kate trong tiếng Chăm có nghĩa là 'ngày hơi nóng' hay 'mùa hè', tượng trưng cho sự tái sinh và tái khởi động của thiên nhiên. Lễ hội là dịp để người Chăm tôn vinh các vị thần linh, cầu mong bình an, không khí mưa thuận gió hòa cho mùa mưa sắp tới. Các hoạt động chính bao gồm: lễ tế cúng tại các tháp Chăm, rước tượng thần, ăn cơm lâm (cơm gạo não), khiêu vũ truyền thống, hát ca truyền thống. Người Chăm mặc trang phục truyền thống đầy sắc màu, tham gia các nghi lễ trang trọng và tôn kính. Kate là biểu tượng của sự gắn kết cộng đồng, giữ gìn bản sắc văn hóa và niềm tin tôn giáo."},

{id:16,name:"Lễ hội Ok Om Bok",province:"Sóc Trăng",lat:9.6,lng:105.98,desc:"Cúng trăng Khmer",img:"https://cdn.tcdulichtphcm.vn/upload/4-2024/images/2024-11-14/-1731565736-134-width960height640.jpg",detail:"Lễ hội Ok Om Bok là lễ hội truyền thống của dân tộc Khmer ở Sóc Trăng, diễn ra vào tháng 10 âm lịch, là lễ cúng trăng (Moon Festival) để cầu mong được Nguyệt Quang Bồ Tát (Bodhisattva Lokeshvara biểu hiện của ánh trăng) phù hộ. Ok Om Bok trong tiếng Khmer có nghĩa là 'xin lỗi trăng' hay 'cầu khấn trăng', thể hiện lòng tôn kính của con người với tự nhiên. Lễ hội bắt đầu từ chiều khi trăng tròn mọc lên, cư dân Khmer mặc trang phục truyền thống, mang theo cơm lâm (cơm gạo nếp hoặc gạo tẻ), các loại bánh, trái cây, đốt nến và hương để cúng trăng. Các hoạt động bao gồm: đua thuyền trên sông, hát ru Khmer, ăn tết (cơm bánh truyền thống), múa phương Đông, các trò chơi dân gian. Lễ hội thể hiện sự kết nối giữa con người, thiên nhiên và tôn giáo trong đời sống của người Khmer."},
{id:17,name:"Lễ hội Nghinh Ông",province:"Vũng Tàu",lat:10.34,lng:107.08,desc:"Cầu ngư ven biển",img:"https://media.vov.vn/sites/default/files/styles/large_watermark/public/2023-09/tu_sang_som_ngu_dan_vung_bien_vung_tau_da_dong_thuyen_ra_khoi_tien_hanh_nghi_thuc_don_ong_anh_luu_son.jpg",detail:"Lễ hội Nghinh Ông tại Vũng Tàu diễn ra vào tháng 8 âm lịch, là lễ hội truyền thống của cộng đồng ngư dân ven biển nhằm cầu mong được Thần Nghinh Ông (Thần Biển) phù hộ cho những chuyến biển an toàn. Nghinh Ông là vị thần được dân gian tôn vinh như một người bạn, người hộ trợ của các ngư dân, sơn nhân ở trên biển. Lễ hội bắt đầu bằng các nghi lễ tế cúng trang trọng tại các đền thờ, rước tượng Nghinh Ông đi quanh các tuyến phố chính của thành phố, diễu hành dạo phố với sự tham gia của hàng ngàn người. Các hoạt động bao gồm: múa rối, hát ru, kéo co, bơi ngang sông, các trò chơi dân gian truyền thống. Người dân trang trí bè ngư với cờ hoa, lộc bạc, tạo nên bầu không khí ấm áp, tôn kính. Lễ hội thể hiện lòng biết ơn, tôn trọng thiên nhiên của cộng đồng ngư dân."},
{id:18,name:"Lễ hội Dinh Cô",province:"Vũng Tàu",lat:10.37,lng:107.1,desc:"Tín ngưỡng dân gian",img:"https://www.onsetbluesfestival.com/wp-content/uploads/2023/04/le-hoi-dinh-co-2-2048x1357.jpg",detail:"Lễ hội Dinh Cô tại Vũng Tàu diễn ra vào tháng 10 âm lịch, tôn vinh Cô Ba Cô (hay Cô Ba Nài) – một vị thánh nữ được người dân sơn, ngư dân tôn kính. Theo truyền thuyết, Cô Ba Cô là một cô gái tốt bụng, được cứu sống bởi một chàng trai, sau đó hai người yêu nhau nhưng không được may mắn, cô đã hi sinh bản thân để bay vào trăng sáng. Lễ hội là dịp để cộng đồng tôn vinh sự hi sinh, lòng tốt bụng và tình yêu vĩ đại của vị thánh nữ này. Các hoạt động bao gồm: lễ tế cúng Dinh Cô, rước bệ tượng, múa rối nước, hát ru dân gian, các trò chơi truyền thống, diễu hành lễ cúng. Người dân tham gia lễ hội mặc trang phục truyền thống, mang theo hương, nến, cơm, trái cây để cúng tặng. Lễ hội không chỉ là nghi lễ tôn giáo mà còn là dịp để ghi nhận giá trị tâm linh và lớp phủ lại các bộ niềm tin truyền thống."},
{id:19,name:"Lễ hội Bà Thu Bồn",province:"Quảng Nam",lat:15.88,lng:108.33,desc:"Lễ hội tín ngưỡng",img:"https://huyhoa.net/files/vietnam/vietnamese-culture/Hung-Temple-Festival.jpg",detail:"Lễ hội Bà Thu Bồn tại Quảng Nam diễn ra vào tháng 8 âm lịch, tôn vinh vị thánh nữ Bà Thu Bồn – một người phụ nữ tốt bụng được cộng đồng địa phương tôn kính lâu đời. Theo truyền thuyết, Bà Thu Bồn là một cô gái đền phúc, hỗ trợ công ty độc lập của cộng đồng, đã hi sinh để bảo vệ cộng đồng. Lễ hội là dịp để người dân tưởng nhớ, tri ân công lao và lòng tốt bụng của vị thánh nữ này. Các hoạt động chính bao gồm: lễ tế cúng Bà Thu Bồn, rước bệ tượng, múa rối, hát ru truyền thống, các trò chơi dân gian, chợ hoa tại các đình, chùa. Người dân mặc trang phục trang trọng, mang theo hương, nến, cơm, trái cây để tôn vinh. Lễ hội thể hiện sự gắn kết cộng đồng, lòng tôn kính với nhân vật anh hùng và tâm linh sâu sắc của người dân vùng Quảng Nam."},
{id:20,name:"Lễ hội Đền Cuông",province:"Nghệ An",lat:19.2,lng:105.68,desc:"Thờ An Dương Vương",img:"https://photo-cms-vovworld.zadn.vn/w500/Uploaded/vovworld/vowklqmx/2020_01_30/bai_dinh_pagoda_festival_opens_in_ninh_binh_RNWT.jpg",detail:"Lễ hội Đền Cuông tại Nghệ An diễn ra vào tháng 3 âm lịch, tôn vinh An Dương Vương – vị vua huyền thoại của nước An Dương quán thời kỳ Hùng Vương. An Dương Vương được coi là vị vua thông minh, tài giỏi trong quân sự, đã xây dựng nước nhân mạnh, dạy dân kỹ thuật canh tác lúa nước. Lễ hội là dịp để tưởng nhớ, tri ân công lao của vị vua này trong lịch sử dân tộc Việt Nam. Các hoạt động chính bao gồm: lễ tế cúng An Dương Vương, rước bệ tượng, múa rối nước, hát ru, kéo co, đua thuyền trên sông Lô, các trò chơi dân gian truyền thống. Người dân tham gia lễ hội mặc trang phục truyền thống, mang theo hương, nến, cơm, cỏ cây, trái cây để cúng tặng. Lễ hội không chỉ là nghi lễ tôn giáo mà còn là dịp để nâng cao ý thức về lịch sử dân tộc và giá trị của những bậc tiền nhân."},

{id:21,name:"Lễ hội Bà Chúa Kho",province:"Bắc Ninh",lat:21.18,lng:106.05,desc:"Cầu tài lộc",img:"https://poliva.vn/wp-content/uploads/2019/07/den-ba-chua-kho-4.jpg",detail:"The Bà Chúa Kho Festival honors the Mother Goddess, one of Vietnam's most revered spiritual figures. Held at the Kho Temple in Bắc Ninh, this festival celebrates the divine mother figure central to Vietnamese folk religion and ancestor veneration. The celebration features traditional processions with elaborate floats, ceremonial offerings of incense and fruits, and ritual performances that reflect ancient spiritual practices. Worshippers from across the region gather to seek blessings for family harmony, health, and prosperity. The festival showcases traditional Vietnamese music and dance, including water puppetry performances and folk songs that have been passed through generations. Visitors can observe participants in traditional silk áo dài costumes, participate in communal meals, and witness the ritualistic lighting of incense sticks that create an atmospheric spiritual experience. The festival typically occurs during the lunar calendar's significant dates and remains an important cultural event for maintaining spiritual connections and community bonds in Vietnamese society."},
{id:22,name:"Lễ hội Chùa Keo",province:"Thái Bình",lat:20.45,lng:106.27,desc:"Lễ hội cổ truyền",img:"https://image.shutterstock.com/image-photo/phu-tho-viet-nam-april-260nw-617636444.jpg",detail:"The Chùa Keo Festival at Vietnam's oldest pagoda, located in Thái Bình Province, commemorates the introduction of Buddhism to northern Vietnam. According to historical records, this temple, established during the Trần Dynasty, played a crucial role in spreading Buddhist teachings throughout the region. The festival attracts thousands of Buddhist monks and lay practitioners who gather for collective worship, meditation sessions, and religious lectures. The temple's ancient architecture, featuring characteristic Vietnamese Buddhist design elements, provides the spiritual backdrop for this important religious celebration. The celebration includes ceremonial lighting of 10,000 oil lamps, symbolizing the spreading of Buddhist enlightenment. Visitors participate in pilgrimage walks, view historical Buddhist artifacts, and attend traditional performances including temple music and dance. The festival emphasizes Buddhist principles of compassion and spiritual development while maintaining cultural traditions. Pilgrims receive blessed water and participate in collective chanting ceremonies that create a deeply spiritual atmosphere. This festival remains significant for Vietnam's Buddhist communities and scholars of Buddhist history."},
{id:23,name:"Lễ hội Đền Sóc",province:"Hà Nội",lat:21.2,lng:105.87,desc:"Thờ Thánh Gióng",img:"https://source.unsplash.com/400x300/?temple.jpg",detail:"Located in Sóc Sơn district near Hà Nội, the Đền Sóc Festival honors local deities and legendary heroes in Vietnamese folk religion. The festival celebrates the 'Three Kings' who, according to local legend, protected the region and brought prosperity to the community. The celebration involves traditional rituals, incense offerings, and ceremonial processions featuring intricately decorated palanquins and traditional music ensembles. Participants wear colorful silk clothing and participate in torch-lit processions during evening ceremonies. The festival showcases traditional Vietnamese religious art including elaborate altar decorations and flower arrangements following traditional design principles. Fortune-telling and divination practitioners offer consultations reflecting traditional practices in Vietnamese spiritual culture. Traditional folk performances include water puppetry depicting the deity's legendary interventions and miraculous deeds. The festival includes herbal medicine exhibitions showcasing traditional Vietnamese healing practices connected to folk spirituality. Community meals emphasize family reunion and intergenerational bonding. The festival preserves important traditions of female spirituality and goddess worship in Vietnamese religion, demonstrating how religious practices address practical community concerns while maintaining spiritual significance."},
{id:24,name:"Lễ hội Phủ Giầy",province:"Nam Định",lat:20.42,lng:106.2,desc:"Thờ Mẫu Liễu Hạnh",img:"-festival-map-vietnam/image/le-hoi-phu-giay.jpg",detail:"The Phủ Giầy Festival in Nam Định Province honors the 'Queen of Heaven' (Phủ) in Vietnamese folk religious traditions. This festival celebrates the protective deity associated with the region's agricultural prosperity and water management systems, particularly important in the Red River Delta area. The celebration features elaborate water rituals that reflect the region's deep connection with waterways and rice cultivation. Traditional processions include drummers, flag bearers, and performers in ancient costumes reenacting historical events. Pilgrims participate in water-based ceremonies and make offerings at temple altars decorated with elaborate floral arrangements. The festival showcases traditional Vietnamese music including bamboo flute performances and ancient folk songs celebrating the region's agricultural heritage. Local artisans display traditional crafts including embroidery and wood carving, while food vendors offer regional specialties. The festival demonstrates how Vietnamese communities maintain spiritual practices connected to their natural environment and agricultural traditions, preserving knowledge about traditional water management and farming techniques passed through generations."},
{id:25,name:"Lễ hội Chùa Dâu",province:"Bắc Ninh",lat:21.12,lng:106.04,desc:"Lễ hội Phật giáo cổ",img:"https://cdn.xanhsm.com/2024/11/a9dbf841-chua-dau-16.jpg",detail:"The Chùa Dâu Festival at Vietnam's oldest pagoda, located in Bắc Ninh Province, commemorates the introduction of Buddhism to northern Vietnam. According to historical records, this temple, established during the Trần Dynasty, played a crucial role in spreading Buddhist teachings throughout the region. The festival attracts thousands of Buddhist monks and lay practitioners who gather for collective worship, meditation sessions, and religious lectures. The temple's ancient architecture, featuring characteristic Vietnamese Buddhist design elements, provides the spiritual backdrop for this important religious celebration. The celebration includes ceremonial lighting of 10,000 oil lamps, symbolizing the spreading of Buddhist enlightenment. Visitors participate in pilgrimage walks, view historical Buddhist artifacts, and attend traditional performances including temple music and dance. The festival emphasizes Buddhist principles of compassion and spiritual development while maintaining cultural traditions. Pilgrims receive blessed water and participate in collective chanting ceremonies that create a deeply spiritual atmosphere. This festival remains significant for Vietnam's Buddhist communities and scholars of Buddhist history."},

{id:26,name:"Lễ hội Chùa Bút Tháp",province:"Bắc Ninh",lat:21.1,lng:106.02,desc:"Di tích Phật giáo",img:"-festival-map-vietnam/image/chùa  bút tháp.jpg",detail:"The Chùa Bút Tháp Festival celebrates one of Vietnam's most distinctive Buddhist temples, famous for its unique literary and spiritual significance. The temple's name, meaning 'Brush Tower,' reflects its historical role as a center of Buddhist learning and calligraphy. The festival features religious ceremonies combined with cultural education programs that honor the temple's intellectual heritage. Visitors observe Buddhist monks performing ancient rituals and participate in meditation sessions designed for spiritual development. The celebration showcases traditional Vietnamese Buddhist music, including the ringing of ancient bronze bells and chanting of Buddhist sutras in traditional Vietnamese dialect. The temple hosts lectures on Buddhist philosophy and Vietnamese history, attracting scholars and spiritual seekers. The festival includes calligraphy demonstrations by monks showcasing the connection between spiritual practice and artistic expression. Traditional crafts exhibitions display Buddhist-inspired artwork and wooden sculptures. The festival preserves the intersection of spirituality, learning, and artistic tradition that characterizes Vietnamese Buddhist culture, making it valuable for understanding how religion and intellectual pursuit historically coexisted in Vietnamese society."},
{id:27,name:"Lễ hội Đền Đô",province:"Bắc Ninh",lat:21.17,lng:106.08,desc:"Thờ vua Lý",img:"https://thumbs.dreamstime.com/b/group-people-traditional-costume-palanquin-procession-h-hai-duong-vietnam-february-holy-con-son-kiep-bac-festival-32630728.jpg",detail:"The Đền Đô Festival in Bắc Ninh honors a legendary female deity central to Vietnamese folk religion and women's spiritual practices. This festival attracts particularly large numbers of female pilgrims seeking blessings for fertility, childbirth, and family well-being. The celebration features elaborate ritual processions with decorative palanquins, traditional music ensembles, and ceremonial offerings of flowers, incense, and fruits arranged in ceremonial patterns. Pilgrims participate in ritual bathing ceremonies believed to bring purification and spiritual blessings. The festival showcases embroidered banners and textile art traditionally created by women in the region, displaying intricate needlework and traditional motifs. Traditional performances include water puppetry and folk dances celebrating feminine virtues and protective maternal figures in Vietnamese culture. The festival creates spaces for women to gather, share spiritual experiences, and strengthen community networks. Food offerings and communal meals emphasize family unity and intergenerational knowledge transmission. The festival demonstrates the significant role of goddess worship and female spiritual authority in Vietnamese religious traditions, preserving cultural practices that reflect women's spiritual agency and community leadership."},
{id:28,name:"Lễ hội Cửa Ông",province:"Quảng Ninh",lat:21.01,lng:107.3,desc:"Thờ Trần Quốc Tảng",img:"https://source.unsplash.com/400x300/?festival.jpg",detail:"The Cửa Ông Festival in Quảng Ninh Province honors the 'Master of the Gate,' a protective deity in Vietnamese fishing communities and maritime traditions. Located near the sea, this temple serves coastal fisherfolk and sailors who rely on spiritual protection for safe passage. The festival features boat processions on the water, with decorated fishing boats participating in ritualistic flotillas accompanied by traditional maritime music. Pilgrims make offerings thanking the deity for safe harvests and protection from sea dangers. The celebration includes the launching of decorative boats carrying incense and flowers into the water as sacrificial offerings. Traditional water puppetry performances depict maritime legends and heroic fishing stories. The festival showcases maritime cultural traditions including traditional boat-building techniques and fishing practices passed through generations. Seafood dishes prepared according to traditional recipes feature prominently in festival meals. The celebration reflects the spiritual relationship between Vietnamese coastal communities and the sea, demonstrating how spiritual practices adapt to specific geographical and occupational communities. The festival preserves maritime cultural heritage while maintaining important safety rituals for fishing communities."},
{id:29,name:"Lễ hội Bạch Đằng",province:"Quảng Ninh",lat:20.9,lng:106.8,desc:"Kỷ niệm chiến thắng Bạch Đằng",img:"https://source.unsplash.com/400x300/?history.jpg",detail:"The Bạch Đằng Festival commemorates the legendary Bạch Đằng River naval victory in 938 AD, celebrating Vietnamese independence and military heroism. Located in Quảng Ninh Province, this festival honors the historical naval battle that secured Vietnam's independence from Chinese occupation. The celebration features ceremonial boat races recreating the historical river battle using traditional Vietnamese watercraft. Participants dress in historical military costumes representing ancient Vietnamese warriors and commanders. The festival includes reenactments of the famous naval tactics, with wooden boats maneuvering to depict the historical victory. Traditional martial arts demonstrations showcase ancient Vietnamese combat techniques. The celebration combines historical commemoration with cultural education, helping younger generations understand Vietnam's struggle for independence. Documentary presentations, historical lectures, and museum exhibitions provide detailed context about this pivotal moment in Vietnamese history. Traditional music performances include war songs and victory anthems passed through generations. The festival demonstrates the cultural significance of military history in Vietnamese identity and the continuing relevance of independence narratives. Patriotic elements emphasize national pride while maintaining focus on historical accuracy and cultural continuity."},
{id:30,name:"Lễ hội Đền Tranh",province:"Hải Dương",lat:21.02,lng:106.37,desc:"Thờ Quan Lớn Tuần Tranh",img:"https://source.unsplash.com/400x300/?temple.jpg",detail:"The Đền Tranh Festival in Hải Dương Province celebrates a legendary female deity known for her miraculous interventions and protective powers. This temple has attracted pilgrims for centuries, particularly women seeking blessings for family matters and health concerns. The festival features elaborate ritual ceremonies, incense offerings, and processions honoring the deity. Participants wear traditional clothing and participate in ceremonial acts of respect and spiritual communion. The celebration includes folk performances depicting the legendary figures' heroic deeds and moral teachings. Traditional music and dance reflect regional cultural characteristics of northern Vietnamese traditions. The festival emphasizes moral virtues including integrity, generosity, and dedication to community welfare. Pilgrims seek blessings for personal and family matters, trusting in the protective powers of these local deities. The celebration demonstrates how Vietnamese communities maintain spiritual practices connected to local history and regional identity. Traditional herbal medicine practitioners set up displays showcasing traditional Vietnamese healing practices. Food offerings prepared according to traditional recipes feature regional specialties. The festival preserves local cultural knowledge and strengthens community bonds through shared spiritual practices and cultural commemoration."},

{id:31,name:"Lễ hội Lam Kinh",province:"Thanh Hóa",lat:19.88,lng:105.43,desc:"Tưởng nhớ Lê Lợi",img:"https://source.unsplash.com/400x300/?heritage.jpg",detail:"The Lam Kinh Festival in Thanh Hóa Province commemorates Lê Lợi, the legendary emperor who led Vietnam's successful resistance against Ming Dynasty invasion in the 15th century. This festival honors the founding father of the Lê Dynasty and celebrates Vietnam's independence and military victories. The celebration features elaborate historical reenactments of the Lam Sơn uprising, with participants dressed in traditional military costumes representing the historical period. Traditional martial arts demonstrations showcase ancient Vietnamese combat techniques and sword fighting. The festival includes boat races on the Ma River, recreating the famous naval battles that led to Vietnamese victory. Historical lectures and museum exhibitions provide educational context about this pivotal period in Vietnamese history. Traditional music performances include victory songs and patriotic anthems passed through generations. The festival combines historical commemoration with cultural education, helping younger generations understand Vietnam's struggle for independence. Patriotic elements emphasize national pride while maintaining focus on historical accuracy and cultural continuity. The celebration demonstrates the cultural significance of military history in Vietnamese identity and the continuing relevance of independence narratives."},
{id:32,name:"Lễ hội Điện Hòn Chén",province:"Huế",lat:16.43,lng:107.55,desc:"Thờ Thiên Y A Na",img:"https://source.unsplash.com/400x300/?festival.jpg",detail:"The Điện Hòn Chén Festival in Huế honors Thiên Y A Na, a legendary female deity associated with healing and protection in Vietnamese folk religion. Located on a small island in the Perfume River, this temple has been a place of pilgrimage for centuries, particularly for women seeking blessings for health and family matters. The festival features elaborate ritual ceremonies, incense offerings, and traditional processions honoring the deity. Pilgrims participate in ritual bathing ceremonies believed to bring purification and spiritual blessings. The celebration showcases traditional Vietnamese herbal medicine practices and healing rituals. Traditional performances include water puppetry and folk dances celebrating feminine virtues and protective maternal figures. The festival creates spaces for women to gather, share spiritual experiences, and strengthen community networks. Food offerings and communal meals emphasize family unity and intergenerational knowledge transmission. The festival demonstrates the significant role of goddess worship and female spiritual authority in Vietnamese religious traditions, preserving cultural practices that reflect women's spiritual agency and community leadership. The celebration reflects the deep connection between Vietnamese spiritual practices and natural waterways."},
{id:33,name:"Lễ hội Tháp Bà Ponagar",province:"Khánh Hòa",lat:12.27,lng:109.2,desc:"Thờ nữ thần Ponagar",img:"https://source.unsplash.com/400x300/?temple.jpg",detail:"The Tháp Bà Ponagar Festival honors the Mother Goddess Ponagar, a central figure in Cham religious traditions and Vietnamese folk religion. Located in Nha Trang, this ancient temple complex represents the fusion of Cham and Vietnamese spiritual practices. The festival features elaborate ritual ceremonies honoring the goddess of fertility, prosperity, and protection. Traditional Cham music and dance performances showcase the region's rich cultural heritage. Pilgrims make offerings of flowers, incense, and traditional foods at the temple altars. The celebration includes water rituals reflecting the coastal location and maritime traditions. Traditional crafts exhibitions display Cham-inspired artwork, jewelry, and textiles. The festival demonstrates the cultural synthesis between Cham and Vietnamese traditions, preserving ancient spiritual practices while adapting to modern contexts. The celebration emphasizes themes of fertility, prosperity, and community protection. Traditional herbal medicine practitioners offer consultations reflecting the connection between spiritual and physical healing. The festival preserves important aspects of Cham cultural heritage while maintaining spiritual significance for Vietnamese communities."},
{id:34,name:"Lễ hội Dinh Thầy Thím",province:"Bình Thuận",lat:10.56,lng:107.73,desc:"Tín ngưỡng dân gian",img:"https://source.unsplash.com/400x300/?festival.jpg",detail:"The Dinh Thầy Thím Festival in Bình Thuận Province celebrates a legendary healer and spiritual figure in Vietnamese folk religion. This festival honors Thầy Thím, a revered healer known for miraculous cures and protective powers. The celebration features elaborate ritual ceremonies, incense offerings, and traditional processions honoring the spiritual figure. Pilgrims seek blessings for health, healing, and protection from illness. The festival showcases traditional Vietnamese herbal medicine practices and healing rituals. Traditional performances include folk dances and music celebrating healing and spiritual protection. The celebration includes displays of traditional medicinal herbs and healing practices. Food offerings and communal meals emphasize community health and well-being. The festival demonstrates the integration of spiritual and medical practices in Vietnamese culture. Traditional divination and fortune-telling practices reflect the connection between spiritual guidance and health. The festival preserves local cultural knowledge about traditional healing methods and strengthens community bonds through shared spiritual practices."},
{id:35,name:"Lễ hội Đua Bò",province:"An Giang",lat:10.36,lng:104.85,desc:"Lễ hội Khmer",img:"https://source.unsplash.com/400x300/?race.jpg",detail:"The Đua Bò Festival in An Giang Province celebrates the Khmer community's traditional buffalo racing, a unique cultural practice in southern Vietnam. This festival honors the buffalo, a sacred animal in Khmer agricultural traditions, and celebrates the harvest season. The celebration features traditional buffalo races where decorated buffalos compete in ritualistic contests. Participants dress in traditional Khmer clothing and participate in ceremonial preparations. The festival includes traditional Khmer music and dance performances showcasing the region's cultural heritage. Traditional Khmer cuisine features prominently in festival meals, emphasizing community sharing. The celebration reflects the deep connection between Khmer communities and their agricultural traditions. The festival demonstrates how cultural practices preserve traditional knowledge about animal husbandry and agricultural cycles. Traditional crafts exhibitions display Khmer-inspired artwork and textiles. The festival preserves important aspects of Khmer cultural heritage while maintaining spiritual significance for local communities. The celebration emphasizes themes of prosperity, community, and agricultural abundance."},

{id:36,name:"Lễ hội Đua Ghe Ngo",province:"Sóc Trăng",lat:9.6,lng:105.97,desc:"Lễ hội sông nước",img:"https://source.unsplash.com/400x300/?boat.jpg",detail:"The Đua Ghe Ngo Festival in Sóc Trăng Province celebrates the Khmer community's traditional boat racing, a vibrant cultural practice in the Mekong Delta region. This festival honors the water buffalo and celebrates community prosperity through traditional boat competitions. The celebration features elaborate boat races where decorated traditional boats compete in ritualistic contests on the region's waterways. Participants dress in traditional Khmer clothing and participate in ceremonial preparations. The festival includes traditional Khmer music and dance performances showcasing the region's rich cultural heritage. Traditional Khmer cuisine features prominently in festival meals, emphasizing community sharing and celebration. The celebration reflects the deep connection between Khmer communities and their aquatic environment. The festival demonstrates how cultural practices preserve traditional knowledge about boat building and navigation. Traditional crafts exhibitions display Khmer-inspired artwork and boat decorations. The festival preserves important aspects of Khmer cultural heritage while maintaining spiritual significance for local communities. The celebration emphasizes themes of community, prosperity, and cultural continuity."},
{id:37,name:"Lễ hội Chol Chnam Thmay",province:"Nam Bộ",lat:10.2,lng:105.9,desc:"Tết Khmer",img:"https://source.unsplash.com/400x300/?festival.jpg",detail:"The Chol Chnam Thmay Festival celebrates the Khmer New Year, marking the beginning of a new agricultural cycle and spiritual renewal. This major festival in southern Vietnam brings together Khmer communities for traditional celebrations and spiritual ceremonies. The celebration features elaborate temple ceremonies, traditional music and dance performances, and community gatherings. Participants engage in traditional games, water festivals, and ritual bathing ceremonies symbolizing purification and renewal. The festival includes traditional Khmer cuisine featuring special New Year dishes and communal meals. Traditional crafts exhibitions display Khmer-inspired artwork, textiles, and decorations. The festival demonstrates the cultural significance of the lunar calendar and agricultural cycles in Khmer traditions. The celebration emphasizes themes of renewal, prosperity, and community harmony. Traditional music and dance performances showcase the region's rich cultural heritage. The festival preserves important aspects of Khmer cultural identity while maintaining spiritual significance for Vietnamese Khmer communities. The celebration reflects the integration of spiritual and cultural practices in Khmer community life."},
{id:38,name:"Lễ hội Cồng Chiêng",province:"Tây Nguyên",lat:14.7,lng:108.0,desc:"Di sản văn hóa",img:"https://source.unsplash.com/400x300/?culture.jpg",detail:"The Cồng Chiêng Festival celebrates the gong culture of the Central Highlands ethnic groups, a UNESCO-recognized intangible cultural heritage. This festival honors the traditional gong orchestras that play central roles in ethnic ceremonies and community celebrations. The celebration features elaborate gong performances by master musicians from various ethnic groups. Participants dress in traditional ethnic clothing and participate in ceremonial dances. The festival includes traditional music performances, folk dances, and cultural exhibitions showcasing the region's diverse ethnic heritage. Traditional crafts displays feature ethnic-inspired artwork, textiles, and musical instruments. The celebration reflects the deep connection between ethnic communities and their musical traditions. The festival demonstrates how cultural practices preserve traditional knowledge about music, dance, and community rituals. Traditional food offerings emphasize community sharing and cultural exchange. The festival preserves important aspects of Central Highlands cultural heritage while maintaining spiritual significance for ethnic communities. The celebration emphasizes themes of cultural diversity, community, and traditional knowledge transmission."},
{id:39,name:"Lễ hội Đua Voi",province:"Đắk Lắk",lat:12.67,lng:108.04,desc:"Truyền thống Tây Nguyên",img:"https://source.unsplash.com/400x300/?elephant.jpg",detail:"The Đua Voi Festival in Đắk Lắk Province celebrates the elephant culture of the Central Highlands ethnic groups, honoring these sacred animals in traditional ceremonies. This festival features traditional elephant races and ceremonies that reflect the deep connection between ethnic communities and elephants. The celebration includes elaborate elephant parades, traditional music performances, and cultural exhibitions. Participants dress in traditional ethnic clothing and participate in ceremonial activities. The festival showcases traditional elephant training techniques and care practices passed through generations. Traditional crafts exhibitions display ethnic-inspired artwork and elephant-themed decorations. The celebration reflects the spiritual significance of elephants in ethnic cultures and their role in community life. The festival demonstrates how cultural practices preserve traditional knowledge about animal husbandry and environmental relationships. Traditional food offerings and communal meals emphasize community sharing. The festival preserves important aspects of Central Highlands cultural heritage while maintaining ecological and cultural significance. The celebration emphasizes themes of harmony with nature, community, and cultural continuity."},
{id:40,name:"Lễ hội Đâm Trâu",province:"Kon Tum",lat:14.35,lng:108.0,desc:"Nghi lễ dân tộc",img:"https://source.unsplash.com/400x300/?tribe.jpg",detail:"The Đâm Trâu Festival in Kon Tum Province celebrates the water buffalo sacrifice ritual of the Bahnar ethnic group, a traditional ceremony marking agricultural cycles and community renewal. This festival honors the buffalo as a sacred animal and celebrates the harvest season. The celebration features traditional buffalo sacrifice ceremonies conducted according to ancient rituals. Participants dress in traditional ethnic clothing and participate in ceremonial preparations. The festival includes traditional music performances, folk dances, and cultural exhibitions showcasing Bahnar cultural heritage. Traditional crafts displays feature ethnic-inspired artwork and ceremonial objects. The celebration reflects the deep connection between ethnic communities and their agricultural traditions. The festival demonstrates how cultural practices preserve traditional knowledge about animal husbandry and agricultural cycles. Traditional food offerings emphasize community sharing and ritual feasting. The festival preserves important aspects of Bahnar cultural heritage while maintaining spiritual significance. The celebration emphasizes themes of renewal, prosperity, and community harmony with nature."},

{id:41,name:"Lễ hội Hoa Đà Lạt",province:"Lâm Đồng",lat:11.94,lng:108.45,desc:"Festival hoa",img:"https://source.unsplash.com/400x300/?flower.jpg",detail:"The Đà Lạt Flower Festival celebrates the city's famous flower industry and natural beauty, attracting visitors from across Vietnam and internationally. This annual festival showcases elaborate floral displays, traditional flower parades, and cultural performances. The celebration features flower exhibitions displaying thousands of varieties of roses, orchids, and seasonal blooms. Participants dress in traditional Vietnamese clothing and participate in flower-themed cultural activities. The festival includes traditional music performances, folk dances, and art exhibitions celebrating the region's natural beauty. Traditional crafts displays feature flower-inspired artwork and floral arrangements. The celebration reflects the deep connection between Vietnamese communities and their natural environment. The festival demonstrates how cultural practices preserve traditional knowledge about horticulture and environmental stewardship. Traditional food offerings emphasize local specialties and community sharing. The festival preserves important aspects of Vietnamese cultural heritage while promoting environmental awareness. The celebration emphasizes themes of natural beauty, community, and cultural continuity."},
{id:42,name:"Lễ hội Cà Phê",province:"Đắk Lắk",lat:12.67,lng:108.04,desc:"Festival cà phê",img:"https://source.unsplash.com/400x300/?coffee.jpg",detail:"The Coffee Festival in Đắk Lắk Province celebrates Vietnam's coffee culture and the region's agricultural heritage. This festival honors the coffee industry that has shaped the local economy and culture. The celebration features coffee exhibitions, traditional coffee ceremonies, and cultural performances. Participants engage in coffee tasting events, traditional music performances, and agricultural demonstrations. The festival includes traditional crafts displays featuring coffee-themed artwork and local handicrafts. Traditional food offerings emphasize local specialties and community sharing. The celebration reflects the deep connection between Vietnamese communities and their agricultural traditions. The festival demonstrates how cultural practices preserve traditional knowledge about coffee cultivation and processing. Traditional music and dance performances showcase the region's cultural heritage. The festival preserves important aspects of Vietnamese agricultural heritage while promoting cultural exchange. The celebration emphasizes themes of community, prosperity, and cultural continuity."},
{id:43,name:"Lễ hội Pháo Hoa",province:"Đà Nẵng",lat:16.05,lng:108.2,desc:"Lễ hội pháo hoa quốc tế",img:"https://source.unsplash.com/400x300/?fireworks.jpg",detail:"The Đà Nẵng International Fireworks Festival celebrates the city's coastal beauty and international appeal through spectacular fireworks displays. This festival brings together international pyrotechnic teams for competitive displays and cultural celebrations. The celebration features elaborate fireworks shows, traditional music performances, and cultural exhibitions. Participants engage in beach festivals, traditional dance performances, and international cultural exchanges. The festival includes traditional crafts displays and local handicrafts exhibitions. Traditional food offerings emphasize local specialties and community sharing. The celebration reflects the connection between Vietnamese communities and their coastal environment. The festival demonstrates how cultural practices preserve traditional knowledge about maritime traditions and celebrations. Traditional music and dance performances showcase the region's cultural heritage. The festival preserves important aspects of Vietnamese cultural heritage while promoting international exchange. The celebration emphasizes themes of community, beauty, and cultural continuity."},
{id:44,name:"Lễ hội Trăng Rằm",province:"Hội An",lat:15.88,lng:108.33,desc:"Lễ hội đèn lồng",img:"https://source.unsplash.com/400x300/?lantern.jpg",detail:"The Hội An Mid-Autumn Lantern Festival celebrates the traditional Vietnamese Mid-Autumn Festival with elaborate lantern displays and cultural performances. This festival honors the harvest moon and family reunions in Vietnamese tradition. The celebration features elaborate lantern parades, traditional lion dances, and cultural performances. Participants engage in lantern-making workshops, traditional music performances, and family-oriented activities. The festival includes traditional crafts displays featuring lantern-making and local handicrafts. Traditional food offerings emphasize mooncakes and community sharing. The celebration reflects the deep connection between Vietnamese communities and their lunar calendar traditions. The festival demonstrates how cultural practices preserve traditional knowledge about family and community celebrations. Traditional music and dance performances showcase the region's cultural heritage. The festival preserves important aspects of Vietnamese cultural heritage while promoting family values. The celebration emphasizes themes of family, community, and cultural continuity."},

function hashFestivalImageSeed(text) {
var value = 0;
var normalized = String(text || '').toLowerCase();
for (var i = 0; i < normalized.length; i++) {
    value = ((value << 5) - value) + normalized.charCodeAt(i);
    value |= 0;
}
return Math.abs(value);
}

function assignLocalFestivalImages(items) {
if (!Array.isArray(items) || !items.length || !localFestivalImagePool.length) return;
items.forEach(function(item) {
    var key = [item && item.id, item && item.name, item && item.province].filter(Boolean).join('|');
    var imageIndex = hashFestivalImageSeed(key) % localFestivalImagePool.length;
    item.img = localFestivalImagePool[imageIndex];
});
}

function normalizeVietnameseText(text) {
    return String(text || "")
        .toLowerCase()
        .normalize('NFD')
        .replace(/\p{M}/gu, '')
        .replace(/đ/g, 'd')
        .trim();
}

function getFestivalTheme(item) {
    var content = normalizeVietnameseText(item.name + ' ' + (item.desc || ''));
    if (/(chua|phat|quan the am|huong tich|yen tu|ponagar|thap ba)/.test(content)) return 'tam linh phat giao';
    if (/(den|phu|dinh|hung|tran|gio|ba trieu|anh hung|lich su)/.test(content)) return 'lich su tam linh';
    if (/(bien|nghinh ong|cau ngu|dua thuyen|ghe ngo|cua lo|sam son|nha trang)/.test(content)) return 'van hoa bien';
    if (/(khmer|chol chnam|ok om bok|kate|kato|ramuwan|ramuwan|cong chieng|dan toc)/.test(content)) return 'ban sac dan toc';
    if (/(hoa|ca phe|trai cay|phao hoa|den long|trang ram|festival)/.test(content)) return 'le hoi du lich';
    return 'van hoa truyen thong';
}

var SAVED_FESTIVAL_IDS_KEY = 'lehoi_saved_festival_ids';

function getSavedFestivalIds() {
    try {
        var raw = localStorage.getItem(SAVED_FESTIVAL_IDS_KEY);
        var parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed.filter(function(id) { return typeof id === 'number'; }) : [];
    } catch (e) {
        return [];
    }
}

function isFestivalSaved(id) {
    return getSavedFestivalIds().includes(id);
}

function setSavedFestivalIds(ids) {
    localStorage.setItem(SAVED_FESTIVAL_IDS_KEY, JSON.stringify(ids));
}

function updateFestivalSaveButton(id) {
    var button = document.getElementById('saveFestivalButton');
    if (!button) return;
    var active = isFestivalSaved(id);
    button.classList.toggle('active', active);
    button.textContent = active ? 'Da luu vao hanh trinh' : 'Luu vao hanh trinh';
}

function toggleFestivalSaved(id) {
    var ids = getSavedFestivalIds();
    if (ids.includes(id)) {
        ids = ids.filter(function(savedId) { return savedId !== id; });
    } else {
        ids.push(id);
    }
    setSavedFestivalIds(ids);
    updateFestivalSaveButton(id);
}

function findNearbyByProvince(list, province, fallbackText) {
    var matched = (list || []).filter(function(item) { return item.province === province; }).slice(0, 2);
    if (!matched.length) return [fallbackText];
    return matched.map(function(item) { return item.name; });
}

function buildAudienceFitHtml(fit) {
    function dots(score) {
        var h = '';
        for (var i = 1; i <= 5; i++) {
            if (i <= score) h += '<span class="audience-dot filled"></span>';
            else h += '<span class="audience-dot"></span>';
        }
        return h;
    }
    return `
    <div class="audience-fit">
        <h4>Mức độ phù hợp</h4>
        <div class="audience-fit-rows">
            <div class="audience-row">
                <span class="audience-label">👨‍👩‍👧 Gia đình</span>
                <div class="audience-dots">${dots(fit.family)}</div>
                <span class="audience-tag">${fit.tags[0]}</span>
            </div>
            <div class="audience-row">
                <span class="audience-label">💑 Cặp đôi</span>
                <div class="audience-dots">${dots(fit.couple)}</div>
                <span class="audience-tag">${fit.tags[1]}</span>
            </div>
            <div class="audience-row">
                <span class="audience-label">🧳 Solo</span>
                <div class="audience-dots">${dots(fit.solo)}</div>

            </div>
        </div>
    </div>`;
}

    2: 'Lễ hội Chùa Hương mở đầu mùa hành hương đầu năm, nổi bật với hành trình đi đò suối Yến và vãn cảnh quần thể chùa động linh thiêng. Du khách thường kết hợp lễ Phật, tham quan thắng cảnh và trải nghiệm văn hóa lễ hội truyền thống vùng ven đô Hà Nội.',
    3: 'Hội Lim là không gian văn hóa quan họ tiêu biểu của Bắc Ninh, nơi các liền anh liền chị giao lưu hát đối đáp trong mùa xuân. Ngoài hát quan họ, lễ hội còn có các sinh hoạt cộng đồng và trò chơi dân gian đậm sắc thái vùng Kinh Bắc.',
    4: 'Festival Huế là chuỗi sự kiện văn hóa nghệ thuật quy mô lớn, tôn vinh di sản cố đô qua trình diễn cung đình, áo dài và hoạt động đường phố. Điểm hấp dẫn của lễ hội nằm ở sự giao thoa giữa giá trị truyền thống và hơi thở đương đại của thành phố Huế.',
    5: 'Lễ hội Bà Chúa Xứ Núi Sam là trung tâm tín ngưỡng quan trọng ở An Giang, nổi bật với nghi lễ rước và cúng Bà cầu bình an, tài lộc. Mùa lễ hội tạo nên không khí hành hương sôi động, gắn với sinh hoạt tâm linh của cư dân Nam Bộ.',
    6: 'Lễ hội Gióng tái hiện tinh thần chống giặc ngoại xâm qua hình tượng Thánh Gióng, kết hợp nghi lễ truyền thống và hoạt động cộng đồng. Đây là lễ hội tiêu biểu của Hà Nội, có giá trị lớn về lịch sử, tín ngưỡng và giáo dục truyền thống dân tộc.',
    7: 'Lễ hội Yên Tử gắn với hành trình về đất tổ Phật giáo Trúc Lâm, nơi người dân và du khách hành hương cầu an đầu năm. Không gian núi rừng linh thiêng cùng các hoạt động lễ Phật tạo nên trải nghiệm tâm linh đặc biệt của Quảng Ninh.',
    8: 'Lễ hội Côn Sơn Kiếp Bạc tôn vinh các bậc danh nhân, anh hùng dân tộc và truyền thống yêu nước của vùng Đông Bắc. Phần lễ rước, tế và phần hội văn hóa dân gian giúp người tham dự cảm nhận rõ chiều sâu lịch sử của di tích.',
    9: 'Lễ hội Đền Trần nổi bật với nghi thức khai ấn đầu xuân, thu hút đông đảo người dân cầu may mắn trong học tập, công việc và cuộc sống. Lễ hội mang đậm dấu ấn lịch sử triều Trần, kết hợp tín ngưỡng và sinh hoạt cộng đồng.',
    10: 'Lễ hội Chọi Trâu Đồ Sơn là nét văn hóa đặc trưng của cư dân vùng biển Hải Phòng, thể hiện tinh thần thượng võ và tính cộng đồng. Bên cạnh phần hội sôi động, nghi thức tế lễ truyền thống vẫn được duy trì trang trọng qua nhiều thế hệ.',
    11: 'Lễ hội Hoa Ban tôn vinh vẻ đẹp mùa hoa và bản sắc văn hóa dân tộc Thái ở Điện Biên, diễn ra trong không khí mùa xuân rực rỡ. Chương trình thường có biểu diễn nghệ thuật dân gian, giới thiệu ẩm thực và trò chơi truyền thống vùng cao.',
    12: 'Lễ hội Lồng Tồng là nghi lễ xuống đồng đầu năm, thể hiện ước vọng mưa thuận gió hòa và mùa màng bội thu của cộng đồng địa phương. Phần lễ nông nghiệp kết hợp phần hội dân gian tạo nên bản sắc riêng của Tuyên Quang.',
    13: 'Lễ hội Đền Bà Triệu tưởng niệm nữ anh hùng dân tộc Bà Triệu, góp phần bồi đắp lòng tự hào và ý thức lịch sử cho cộng đồng. Nghi lễ rước, tế cùng hoạt động văn hóa truyền thống làm nổi bật tinh thần thượng võ xứ Thanh.',
    14: 'Lễ hội Cầu Ngư ở Đà Nẵng phản ánh đời sống tín ngưỡng của ngư dân, với mong ước biển yên sóng lặng và đánh bắt thuận lợi. Không gian lễ hội sông nước, hát bả trạo và các hoạt động cộng đồng tạo nên sắc thái đặc trưng miền biển.',
    15: 'Lễ hội Katê là sự kiện văn hóa lớn của người Chăm ở Ninh Thuận, diễn ra tại các tháp Chăm với nghi thức trang trọng và âm nhạc truyền thống. Lễ hội thể hiện rõ bản sắc tộc người, tinh thần gắn kết cộng đồng và gìn giữ di sản.',
    16: 'Lễ hội Ok Om Bok của người Khmer ở Sóc Trăng nổi bật với nghi thức cúng trăng và sinh hoạt văn hóa cộng đồng vào mùa cuối năm. Hoạt động thả đèn nước, biểu diễn nghệ thuật và ẩm thực truyền thống tạo nên không khí lễ hội đặc sắc.',
    17: 'Lễ hội Nghinh Ông tại Vũng Tàu là nghi lễ cầu ngư quan trọng của cư dân biển, thể hiện niềm tin vào sự che chở trong những chuyến ra khơi. Lễ rước trên biển và hoạt động cộng đồng mang đậm bản sắc văn hóa địa phương.',
    18: 'Lễ hội Dinh Cô là điểm hẹn tâm linh nổi bật ở vùng biển Vũng Tàu, nơi người dân và du khách đến cầu bình an, may mắn. Phần lễ truyền thống kết hợp sinh hoạt văn hóa dân gian tạo nên không gian lễ hội gần gũi, linh thiêng.',
    19: 'Lễ hội Bà Thu Bồn ở Quảng Nam gắn với tín ngưỡng thờ nữ thần sông, phản ánh mối quan hệ mật thiết giữa cư dân và môi trường sông nước. Nghi lễ truyền thống cùng các hoạt động hội làng giúp bảo tồn giá trị văn hóa bản địa.',
    20: 'Lễ hội Đền Cuông tưởng niệm An Dương Vương và truyền thuyết lịch sử gắn với vùng đất Nghệ An. Không gian lễ hội kết hợp dâng hương, rước lễ và các hoạt động văn hóa cộng đồng giàu ý nghĩa giáo dục truyền thống.',
    21: 'Lễ hội Bà Chúa Kho tại Bắc Ninh nổi tiếng với nghi thức cầu tài lộc đầu năm, thu hút đông đảo người dân và tiểu thương. Bên cạnh tín ngưỡng dân gian, lễ hội còn phản ánh đời sống kinh tế, văn hóa vùng Kinh Bắc.',
    22: 'Lễ hội Chùa Keo là lễ hội cổ truyền tiêu biểu của Thái Bình, gắn với di tích kiến trúc tôn giáo có giá trị lịch sử cao. Các nghi thức tế lễ, rước kiệu cùng trò diễn dân gian tạo nên bản sắc riêng cho mùa hội địa phương.',
    23: 'Lễ hội Đền Sóc thờ Thánh Gióng, thể hiện tinh thần yêu nước và truyền thống chống ngoại xâm trong văn hóa Việt. Lễ hội có phần nghi lễ trang nghiêm, kết hợp hoạt động cộng đồng trong không khí đầu xuân.',
    24: 'Lễ hội Phủ Giầy tôn vinh tín ngưỡng thờ Mẫu Liễu Hạnh, là một trong những trung tâm thực hành đạo Mẫu nổi bật ở miền Bắc. Nghi thức hầu đồng, dâng lễ và sinh hoạt văn hóa tâm linh tạo nên nét đặc sắc của lễ hội.',
    25: 'Lễ hội Chùa Dâu gắn với trung tâm Phật giáo cổ, phản ánh quá trình hình thành và phát triển văn hóa tôn giáo ở vùng Kinh Bắc. Người tham dự thường kết hợp lễ Phật, tham quan di tích và tìm hiểu nghệ thuật dân gian truyền thống.',
    26: 'Lễ hội Chùa Bút Tháp tôn vinh giá trị di tích Phật giáo và nghệ thuật điêu khắc cổ của Bắc Ninh. Không gian lễ hội yên bình, phù hợp cho hành hương, cầu an và trải nghiệm chiều sâu văn hóa truyền thống.',
    27: 'Lễ hội Đền Đô tưởng nhớ các vị vua nhà Lý, góp phần tái hiện dấu ấn lịch sử của triều đại có nhiều đóng góp cho quốc gia. Phần lễ và phần hội đều nhấn mạnh tinh thần tôn vinh tiền nhân và gắn kết cộng đồng.',
    28: 'Lễ hội Cửa Ông là lễ hội lớn của Quảng Ninh, thờ Trần Quốc Tảng và gắn với truyền thống uống nước nhớ nguồn. Nghi thức rước lễ, tế tự và sinh hoạt văn hóa dân gian thu hút đông đảo người dân, du khách tham gia.',
    29: 'Lễ hội Bạch Đằng tưởng niệm chiến thắng lịch sử trên sông Bạch Đằng, khơi dậy niềm tự hào dân tộc và tinh thần độc lập. Hoạt động tưởng niệm kết hợp văn nghệ, giáo dục lịch sử tạo nên chiều sâu cho lễ hội.',
    30: 'Lễ hội Đền Tranh gắn với tín ngưỡng thờ Quan Lớn Tuần Tranh trong hệ thống văn hóa tâm linh vùng đồng bằng Bắc Bộ. Lễ hội là dịp cầu bình an, thuận lợi và duy trì sinh hoạt tín ngưỡng truyền thống của cộng đồng.',
    31: 'Lễ hội Lam Kinh tưởng nhớ công lao vua Lê Lợi và cuộc khởi nghĩa Lam Sơn, là điểm nhấn văn hóa - lịch sử của Thanh Hóa. Các nghi thức dâng hương, tế lễ cùng hoạt động nghệ thuật dân gian tạo không khí trang trọng.',
    32: 'Lễ hội Điện Hòn Chén tại Huế kết hợp tín ngưỡng dân gian và yếu tố cung đình, diễn ra trong không gian sông Hương đặc sắc. Lễ rước trên sông cùng nghi thức thờ Thiên Y A Na tạo nên trải nghiệm văn hóa tâm linh độc đáo.',
    33: 'Lễ hội Tháp Bà Ponagar là sự kiện quan trọng ở Khánh Hòa, tôn vinh nữ thần Thiên Y A Na và giá trị văn hóa Chăm - Việt. Không gian tháp cổ, nghi lễ truyền thống và hoạt động cộng đồng tạo nên sức hút lớn cho du khách.',
    34: 'Lễ hội Dinh Thầy Thím tại Bình Thuận gắn với tín ngưỡng dân gian của cư dân duyên hải Nam Trung Bộ. Người dân tham gia lễ hội để cầu bình an, may mắn và tưởng nhớ công đức nhân vật được thờ tự.',
    35: 'Lễ hội Đua Bò ở An Giang là nét văn hóa đặc trưng của cộng đồng Khmer, thể hiện tinh thần thể thao dân gian và sự gắn kết cộng đồng. Sự kiện thường diễn ra sôi động với đông đảo người dân, du khách theo dõi.',
    36: 'Lễ hội Đua Ghe Ngo ở Sóc Trăng là hoạt động văn hóa thể thao tiêu biểu của người Khmer Nam Bộ. Những cuộc đua ghe sôi nổi trên sông đi cùng lễ nghi truyền thống tạo nên không khí lễ hội đặc sắc.',
    37: 'Lễ hội Chol Chnam Thmay là Tết cổ truyền của người Khmer, đánh dấu thời điểm chuyển mùa và khởi đầu năm mới. Hoạt động cúng lễ, vui hội và thăm hỏi cộng đồng thể hiện rõ bản sắc văn hóa dân tộc.',
    38: 'Lễ hội Cồng Chiêng tôn vinh không gian văn hóa cồng chiêng Tây Nguyên, nơi âm nhạc cộng đồng gắn liền với nghi lễ đời sống. Đây là dịp quan trọng để bảo tồn di sản phi vật thể và truyền dạy văn hóa bản địa cho thế hệ trẻ.',
    39: 'Lễ hội Đua Voi ở Đắk Lắk phản ánh bản sắc văn hóa độc đáo của cư dân Tây Nguyên trong mối quan hệ với voi nhà. Sự kiện mang tính biểu diễn truyền thống, thu hút du khách và góp phần quảng bá văn hóa địa phương.',
    40: 'Lễ hội Đâm Trâu là nghi lễ cộng đồng của một số tộc người Tây Nguyên, thể hiện quan niệm tâm linh và ước vọng no đủ. Khi tìm hiểu, du khách nên tôn trọng phong tục địa phương và tiếp cận với tinh thần bảo tồn văn hóa.',
    41: 'Lễ hội Hoa Đà Lạt tôn vinh thương hiệu thành phố ngàn hoa với không gian trưng bày nghệ thuật hoa, chương trình biểu diễn và hoạt động cộng đồng. Lễ hội là điểm nhấn du lịch quan trọng của Lâm Đồng vào mùa cuối năm.',
    42: 'Lễ hội Cà Phê ở Đắk Lắk quảng bá giá trị hạt cà phê Việt Nam, kết hợp trình diễn văn hóa và trải nghiệm sản phẩm địa phương. Sự kiện góp phần kết nối du lịch, nông nghiệp và bản sắc Tây Nguyên.',
    43: 'Lễ hội Pháo Hoa tại Đà Nẵng là sự kiện du lịch quốc tế nổi bật với các đêm trình diễn nghệ thuật ánh sáng trên sông Hàn. Không khí lễ hội đường phố và dịch vụ du lịch đi kèm tạo sức hút mạnh cho thành phố biển.',
    44: 'Lễ hội Trăng Rằm ở Hội An nổi tiếng với không gian đèn lồng, hoạt động văn hóa truyền thống và nhịp sống phố cổ về đêm. Sự kiện mang lại trải nghiệm giàu bản sắc cho du khách trong dịp trung thu.',
    45: 'Lễ hội Biển Nha Trang tôn vinh văn hóa biển đảo với chuỗi hoạt động nghệ thuật, thể thao và quảng bá du lịch ven biển. Đây là dịp để giới thiệu hình ảnh thành phố biển năng động, thân thiện và giàu bản sắc.',
    46: 'Lễ hội Hang Động ở Quảng Bình quảng bá giá trị cảnh quan thiên nhiên và du lịch khám phá hệ thống hang động nổi tiếng. Sự kiện thường kết hợp trình diễn văn hóa địa phương và hoạt động trải nghiệm dành cho du khách.',
    47: 'Lễ hội Đua Thuyền tại Quảng Bình gắn với truyền thống sông nước và tinh thần thi đấu cộng đồng của cư dân địa phương. Những cuộc đua thuyền sôi động tạo không khí náo nhiệt và củng cố tính đoàn kết cộng đồng.',
    48: 'Lễ hội Gầu Tào của người Mông ở Hà Giang mang ý nghĩa cầu phúc, cầu may và gắn kết cộng đồng đầu năm. Lễ hội có nhiều hoạt động văn hóa dân gian, trò chơi truyền thống và biểu diễn nghệ thuật vùng cao.',
    49: 'Lễ hội Nhảy Lửa là nghi lễ độc đáo thể hiện sức mạnh tinh thần và tín ngưỡng cộng đồng của một số tộc người miền núi. Nghi thức diễn ra trong không khí linh thiêng, phản ánh đậm nét bản sắc văn hóa bản địa.',
    50: 'Lễ hội Hoa Tam Giác Mạch ở Hà Giang diễn ra vào mùa hoa nở, kết hợp quảng bá cảnh quan cao nguyên đá và văn hóa địa phương. Du khách thường tham gia chụp ảnh, trải nghiệm ẩm thực và tìm hiểu sinh hoạt cộng đồng vùng cao.',
    51: 'Lễ hội Chợ Tình Khâu Vai là nét văn hóa độc đáo của Hà Giang, gắn với câu chuyện tình và không gian gặp gỡ cộng đồng vùng cao. Đây là dịp giao lưu văn hóa, mua bán sản vật và trải nghiệm sinh hoạt chợ phiên truyền thống.',
    52: 'Lễ hội Đền Thượng tại Lào Cai gắn với tín ngưỡng thờ Trần Hưng Đạo và đời sống tâm linh của cư dân biên giới. Hoạt động dâng hương, rước lễ và sinh hoạt cộng đồng tạo nên không khí lễ hội trang nghiêm, gần gũi.',
    53: 'Lễ hội Đền Bảo Hà tôn vinh thần Hoàng Bảy, là điểm đến tâm linh quen thuộc của người dân miền Bắc. Lễ hội thu hút du khách bởi nghi thức truyền thống, không gian văn hóa vùng núi và đời sống tín ngưỡng dân gian.',
    54: 'Lễ hội Roóng Poọc là lễ hội xuống đồng của cộng đồng địa phương ở Lào Cai, thể hiện ước mong mùa màng thuận lợi. Phần nghi lễ nông nghiệp kết hợp văn nghệ, trò chơi truyền thống giúp bảo tồn nét văn hóa bản địa.',
    55: 'Lễ hội Tết Nhảy của người Dao là hoạt động văn hóa - tín ngưỡng đặc sắc, tái hiện nghi lễ truyền đời của cộng đồng. Lễ hội góp phần giữ gìn phong tục, âm nhạc và nghệ thuật trình diễn truyền thống dân tộc.',
    56: 'Lễ hội Hoa Ban ở Sơn La tôn vinh mùa hoa vùng Tây Bắc và các giá trị văn hóa dân tộc địa phương. Chương trình thường có biểu diễn nghệ thuật dân gian, giới thiệu sản vật và trải nghiệm du lịch cộng đồng.',
    57: 'Lễ hội Hạn Khuống là sinh hoạt văn hóa của người Thái, phản ánh đời sống tinh thần và nghệ thuật giao duyên truyền thống. Không gian lễ hội giàu bản sắc, phù hợp để tìm hiểu văn hóa vùng cao Tây Bắc.',
    58: 'Lễ hội Xên Bản ở Lai Châu mang ý nghĩa cầu mùa, cầu bình an cho bản làng và cộng đồng cư dân nông nghiệp. Phần nghi lễ truyền thống đi cùng hoạt động hội tạo nên không khí gắn kết cộng đồng sâu sắc.',
    59: 'Lễ hội Then Kin Pang là sự kiện văn hóa tiêu biểu của người Thái, thể hiện nghi lễ tín ngưỡng và nghệ thuật dân gian truyền thống. Lễ hội góp phần bảo tồn tiếng nói, trang phục và sinh hoạt văn hóa cộng đồng.',
    60: 'Lễ hội Lẩu Then tại Cao Bằng phản ánh đời sống tín ngưỡng dân gian của cư dân địa phương, gắn với mong ước bình an và thuận lợi. Nghi lễ truyền thống cùng không gian văn hóa bản địa tạo nên bản sắc riêng của lễ hội.',
