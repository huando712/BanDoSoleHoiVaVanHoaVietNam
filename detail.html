function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
}

function displayDetail() {
    const type = getQueryParam('type');
    const id = parseInt(getQueryParam('id'));

    let item = null;
    let title = '';

    if (type === 'festival') {
        item = festivals.find(f => f.id === id);
        title = 'Lễ hội';
    } else if (type === 'entertainment') {
        item = entertainments.find(e => e.id === id);
        title = 'Khu vui chơi';
    } else if (type === 'food') {
        item = foods.find(f => f.id === id);
        title = 'Ẩm thực';
    } else if (type === 'hotel') {
        item = hotels.find(h => h.id === id);
        title = 'Khách sạn';
    } else if (type === 'medical') {
        item = medicals.find(m => m.id === id);
        title = 'Bệnh viện';
    } else if (type === 'store') {
        item = stores.find(s => s.id === id);
        title = 'Cửa hàng tiện lợi';
    }

    if (item) {
        document.getElementById('detailContent').innerHTML = `
            <h2>${item.name}</h2>
            <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
            <p><strong>Tỉnh:</strong> ${item.province}</p>
            <p>${item.desc}</p>
            <p><strong>Vị trí:</strong> ${item.lat}, ${item.lng}</p>
            <a href="https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}" target="_blank">
                <button>Chỉ đường</button>
            </a>
        `;
    } else {
        document.getElementById('detailContent').innerHTML = '<p>Không tìm thấy thông tin.</p>';
    }
}

window.onload = displayDetail;
